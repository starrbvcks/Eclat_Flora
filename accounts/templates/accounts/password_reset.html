{% extends "shop/base.html" %}

{% block title %}فراموشی رمز | Éclat Floral{% endblock %}

{% block content %}
<style>
    .auth-box {
        width: min(480px, 100%);
        margin: 0 auto;
        padding: 32px;
        border: 1px solid var(--border-soft);
        background: linear-gradient(180deg, var(--surface) 0%, #0a0a0a 100%);
    }

    .auth-box h1 {
        margin: 0 0 10px;
        font-size: 28px;
        font-weight: 800;
    }

    .auth-copy {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.8;
    }

    .form-row {
        margin-bottom: 16px;
    }

    .form-row label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 14px;
    }

    .form-row input {
        width: 100%;
        padding: 13px 14px;
        border: 1px solid var(--border);
        background: var(--bg-deep);
        color: var(--text);
    }
</style>

<section class="auth-box">
    <h1>فراموشی رمز</h1>
    <p class="auth-copy">ایمیل حساب‌تان را وارد کنید تا لینک تنظیم رمز جدید برایتان ارسال شود.</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-row">
            {{ form.email.label_tag }}
            {{ form.email }}
        </div>
        <button class="btn" type="submit">ارسال لینک تغییر رمز</button>
    </form>
</section>
{% endblock %}
