{% extends "shop/base.html" %}

{% block title %}رمز تغییر کرد | Éclat Floral{% endblock %}

{% block content %}
<style>
    .done-box {
        width: min(520px, 100%);
        margin: 0 auto;
        padding: 34px;
        border: 1px solid var(--border-soft);
        background: linear-gradient(180deg, var(--surface) 0%, #0a0a0a 100%);
    }

    .done-box h1 {
        margin: 0 0 14px;
        font-size: 28px;
        font-weight: 800;
    }

    .done-box p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.9;
    }
</style>

<section class="done-box">
    <h1>رمز جدید ذخیره شد</h1>
    <p>حالا می‌توانید با رمز جدید وارد حساب شوید.</p>
    <a class="btn" href="{% url 'accounts:login' %}">ورود</a>
</section>
{% endblock %}
