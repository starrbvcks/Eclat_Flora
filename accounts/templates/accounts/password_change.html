{% extends "shop/base.html" %}

{% block title %}تغییر رمز | Éclat Floral{% endblock %}

{% block content %}
<style>
    .auth-box {
        width: min(480px, 100%);
        margin: 0 auto;
        padding: 32px;
        border: 1px solid var(--border-soft);
        background: linear-gradient(180deg, var(--surface) 0%, #0a0a0a 100%);
    }

    .auth-box h1 {
        margin: 0 0 24px;
        font-size: 28px;
        font-weight: 800;
    }

    .form-row {
        margin-bottom: 16px;
    }

    .form-row label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 14px;
    }

    .form-row input {
        width: 100%;
        padding: 13px 14px;
        border: 1px solid var(--border);
        background: var(--bg-deep);
        color: var(--text);
    }

    .form-errors {
        margin-top: 8px;
        color: var(--danger);
        font-size: 13px;
        line-height: 1.7;
    }
</style>

<section class="auth-box">
    <h1>تغییر رمز عبور</h1>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-row">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <div class="form-errors">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button class="btn" type="submit">ذخیره رمز جدید</button>
    </form>
</section>
{% endblock %}
