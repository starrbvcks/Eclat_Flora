<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}پنل مدیریت | Éclat Floral{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --admin-bg: #fbf7ee;
            --admin-bg-soft: #fffdf8;
            --admin-ink: #201d19;
            --admin-muted: #9b8f83;
            --admin-line: #eee5dc;
            --admin-card: rgba(255, 255, 255, 0.88);
            --admin-nav: #171411;
            --admin-accent: #b86a4e;
            --admin-accent-soft: #f1ded6;
            --admin-gold: #c2a15f;
            --admin-success: #6c8b68;
            --admin-warning: #b88b41;
            --admin-danger: #bd655f;
            --font-fa: "Vazirmatn", "IRANSansX", "Yekan Bakh", "Segoe UI", Tahoma, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 25%, rgba(184, 106, 78, 0.12), transparent 26rem),
                radial-gradient(circle at 82% 35%, rgba(194, 161, 95, 0.1), transparent 30rem),
                var(--admin-bg);
            color: var(--admin-ink);
            direction: rtl;
            font-family: var(--font-fa);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select {
            font: inherit;
        }

        .admin-shell {
            width: min(1280px, calc(100% - 48px));
            margin: 0 auto;
            padding: 24px 0 70px;
        }

        .admin-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 22px;
            padding: 18px 20px;
            border: 1px solid rgba(238, 229, 220, 0.9);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 18px 50px rgba(93, 64, 45, 0.08);
            backdrop-filter: blur(14px);
        }

        .admin-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 999px;
            background: var(--admin-accent);
            color: #fff7ef;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 22px;
        }

        .admin-brand strong {
            display: block;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 24px;
            line-height: 1.2;
        }

        .admin-brand span {
            display: block;
            margin-top: 2px;
            color: var(--admin-muted);
            font-size: 13px;
        }

        .admin-top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-header-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .admin-header-nav a {
            display: inline-flex;
            align-items: center;
            min-height: 40px;
            padding: 0 13px;
            border-radius: 999px;
            color: var(--admin-muted);
            font-size: 13px;
            font-weight: 800;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .admin-header-nav a:hover {
            background: #efe7dd;
            color: var(--admin-ink);
        }

        .admin-user-pill {
            display: inline-flex;
            align-items: center;
            min-height: 44px;
            padding: 0 14px;
            border: 1px solid var(--admin-line);
            border-radius: 999px;
            background: #fffaf3;
            color: var(--admin-ink);
            font-size: 13px;
            font-weight: 800;
        }

        .admin-action-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 13px;
            border: 1px solid var(--admin-line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.74);
            color: var(--admin-ink);
            font-size: 13px;
            font-weight: 800;
        }

        .panel-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            width: min(980px, 100%);
            min-height: 78px;
            margin: 34px auto 46px;
            padding: 10px;
            border-radius: 22px;
            background: var(--admin-nav);
            box-shadow: 0 22px 55px rgba(39, 28, 20, 0.14);
        }

        .panel-nav a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 52px;
            padding: 0 24px;
            border-radius: 15px;
            color: #d9d0c7;
            font-weight: 700;
        }

        .panel-nav a.active,
        .panel-nav a:hover {
            background: #34302b;
            color: #ffffff;
        }

        .page-kicker {
            margin: 0 0 8px;
            color: var(--admin-accent);
            font-weight: 800;
        }

        .page-title {
            margin: 0 0 34px;
            color: var(--admin-ink);
            font-size: clamp(32px, 5vw, 54px);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1.35;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 34px;
        }

        .stat-card,
        .panel-card {
            border: 1px solid rgba(238, 229, 220, 0.8);
            border-radius: 20px;
            background: var(--admin-card);
            box-shadow: 0 18px 45px rgba(93, 64, 45, 0.08);
        }

        .stat-card {
            min-height: 140px;
            padding: 24px;
        }

        .stat-card strong {
            display: block;
            margin-bottom: 8px;
            font-size: 34px;
            line-height: 1;
        }

        .stat-card span {
            color: var(--admin-muted);
            font-size: 14px;
            font-weight: 700;
        }

        .panel-card {
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 24px 28px;
            border-bottom: 1px solid var(--admin-line);
        }

        .panel-head h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
        }

        .panel-head a,
        .admin-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 16px;
            border: 0;
            border-radius: 12px;
            background: var(--admin-accent);
            color: #fff9f3;
            cursor: pointer;
            font-weight: 800;
        }

        .admin-button.secondary,
        .panel-head a.secondary {
            background: #efe7dd;
            color: var(--admin-ink);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th,
        .admin-table td {
            padding: 18px 24px;
            border-bottom: 1px solid var(--admin-line);
            text-align: right;
            vertical-align: middle;
        }

        .admin-table th {
            color: var(--admin-muted);
            font-size: 13px;
            font-weight: 800;
        }

        .admin-table tbody tr:hover {
            background: rgba(184, 106, 78, 0.04);
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-cell img,
        .product-placeholder {
            flex: 0 0 auto;
            width: 54px;
            height: 62px;
            border-radius: 14px;
            object-fit: cover;
            background: #efe7dd;
        }

        .product-cell strong,
        .product-cell span {
            display: block;
        }

        .product-cell span,
        .table-muted {
            color: var(--admin-muted);
            font-size: 13px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
        }

        .status-success {
            background: rgba(108, 139, 104, 0.14);
            color: var(--admin-success);
        }

        .status-warning {
            background: rgba(184, 139, 65, 0.14);
            color: var(--admin-warning);
        }

        .status-danger {
            background: rgba(189, 101, 95, 0.14);
            color: var(--admin-danger);
        }

        .filter-bar {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) 190px auto;
            gap: 12px;
            margin-bottom: 24px;
        }

        .filter-bar input,
        .filter-bar select {
            width: 100%;
            min-height: 48px;
            padding: 0 14px;
            border: 1px solid var(--admin-line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--admin-ink);
        }

        .empty-panel {
            padding: 36px;
            color: var(--admin-muted);
            text-align: center;
        }

        @media (max-width: 900px) {
            .admin-shell {
                width: min(100% - 28px, 1280px);
            }

            .admin-topbar,
            .panel-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .admin-header-nav,
            .admin-top-actions {
                flex-wrap: wrap;
                justify-content: flex-start;
            }

            .panel-nav {
                justify-content: flex-start;
                overflow-x: auto;
            }

            .stat-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .filter-bar {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 620px) {
            .stat-grid {
                grid-template-columns: 1fr;
            }

            .admin-table {
                min-width: 720px;
            }

            .table-wrap {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="admin-shell">
        <header class="admin-topbar">
            <a class="admin-brand" href="{% url 'shop:dashboard' %}">
                <span class="brand-mark">É</span>
                <span>
                    <strong>Éclat Floral</strong>
                    <span>پنل مدیریت فروشگاه</span>
                </span>
            </a>

            <nav class="admin-header-nav" aria-label="لینک‌های مدیریتی">
                <a href="{% url 'shop:dashboard' %}">داشبورد</a>
                <a href="{% url 'shop:dashboard_products' %}">محصولات</a>
                <a href="{% url 'shop:dashboard_orders' %}">سفارش‌ها</a>
                <a href="{% url 'shop:contact' %}">تماس سایت</a>
            </nav>

            <div class="admin-top-actions">
                <span class="admin-user-pill">{{ request.user.username }}</span>
                <a class="admin-action-link" href="{% url 'shop:product_list' %}">مشاهده سایت</a>
                <a class="admin-action-link" href="{% url 'admin:index' %}">Django admin</a>
                <a class="admin-action-link" href="{% url 'accounts:profile' %}">حساب من</a>
            </div>
        </header>

        <nav class="panel-nav" aria-label="ناوبری پنل مدیریت">
            <a class="{% if active_panel == 'overview' %}active{% endif %}" href="{% url 'shop:dashboard' %}">نمای کلی</a>
            <a class="{% if active_panel == 'products' %}active{% endif %}" href="{% url 'shop:dashboard_products' %}">محصولات</a>
            <a class="{% if active_panel == 'orders' %}active{% endif %}" href="{% url 'shop:dashboard_orders' %}">سفارش‌ها</a>
            <a href="{% url 'admin:shop_category_changelist' %}">دسته‌بندی‌ها</a>
        </nav>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
