<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} | Éclat Floral</title>
    <style>
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Playfair Display', serif;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
        }
        .detail-container {
            display: flex;
            gap: 50px;
            max-width: 900px;
            align-items: center;
        }
        .product-image img {
            max-width: 400px;
            border: 1px solid #333;
            filter: grayscale(10%);
        }
        .product-info {
            text-align: left;
        }
        .product-info h1 {
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .price {
            color: #d4af37;
            font-size: 1.5em;
            margin: 20px 0;
        }
        .description {
            line-height: 1.6;
            color: #aaa;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="detail-container">
        <div class="product-image">
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
            {% endif %}
        </div>
        <div class="product-info">
            <h1>{{ product.name }}</h1>
            <p class="price">${{ product.price }}</p>
            <p class="description">{{ product.description }}</p>
            <p>موجودی انبار: {{ product.stock }} عدد</p>
            <a href="{% url 'shop:product_list' %}" class="back-btn">← بازگشت به ویترین</a>
        </div>
    </div>

</body>
</html>
