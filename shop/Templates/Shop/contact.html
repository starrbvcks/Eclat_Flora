{% extends "shop/base.html" %}

{% block title %}تماس | Éclat Floral{% endblock %}

{% block content %}
<style>
    .contact-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 34px;
        width: min(960px, 100%);
        margin: 0 auto;
    }

    .contact-copy h1 {
        margin: 0 0 18px;
        font-size: 34px;
        font-weight: 400;
        line-height: 1.5;
    }

    .contact-copy p {
        margin: 0;
        color: var(--muted);
        line-height: 2;
    }

    .contact-list {
        margin: 0;
        padding: 24px;
        border: 1px solid var(--border-soft);
        background: linear-gradient(180deg, var(--surface) 0%, #0a0a0a 100%);
        list-style: none;
    }

    .contact-list strong {
        display: block;
        margin-bottom: 6px;
        color: var(--muted-soft);
        font-size: 13px;
        font-weight: 400;
    }

    .contact-list li + li {
        margin-top: 20px;
    }

    @media (max-width: 760px) {
        .contact-layout {
            grid-template-columns: 1fr;
        }
    }
</style>

<section class="contact-layout">
    <div class="contact-copy">
        <h1>تماس با ما</h1>
        <p>برای سفارش اختصاصی یا هماهنگی خرید، از راه‌های زیر با Éclat Floral در ارتباط باشید.</p>
    </div>

    <ul class="contact-list">
        <li>
            <strong>ارسال</strong>
            تهران
        </li>
        <li>
            <strong>اینستاگرام</strong>
            @eclatflowershop
        </li>
        <li>
            <strong>ارتباط</strong>
            @idontwannatalk
        </li>
    </ul>
</section>
{% endblock %}
